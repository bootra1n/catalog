<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XV Fashion Catalog</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: #2c2c2c; border-radius: 12px; padding: 10px; text-align: center; border: 1px solid #3d3d3d; }
        .card img { width: 100%; border-radius: 8px; height: 140px; object-fit: cover; background: #000; }
        .card h3 { font-size: 13px; margin: 10px 0; height: 32px; overflow: hidden; color: #eee; }
        .btn { display: block; background: #d4af37; color: black; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; width: 100%; }
        #status { text-align: center; margin-top: 20px; color: #d4af37; }
    </style>
</head>
<body>
    <h2 style="text-align: center; color: #d4af37;">XV Fashion</h2>
    <div id="status">Загрузка товаров...</div>
    <div class="grid" id="catalog"></div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/1qlHWEkGHqrR_WT_g1-ogpKZn88c1xloEq5sDjszK3Kg/export?format=csv&gid=1947283332';

        async function loadCatalog() {
            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                const rows = data.split('\n');
                const container = document.getElementById('catalog');
                const status = document.getElementById('status');
                
                container.innerHTML = '';

                // Читаем с 10-й строки (индекс 9)
                for (let i = 9; i < rows.length; i++) {
                    const row = rows[i].trim();
                    if (!row) continue;

                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    
                    if (cols.length >= 2) {
                        const name = cols[0].replace(/"/g, '').trim();
                        let imgRaw = cols[1].replace(/"/g, '').trim();

                        // Очистка от формулы =IMAGE("ссылка")
                        if (imgRaw.includes('IMAGE("')) {
                            imgRaw = imgRaw.split('IMAGE("')[1].split('")')[0];
                        } else if (imgRaw.includes("IMAGE('")) {
                            imgRaw = imgRaw.split("IMAGE('")[1].split("')")[0];
                        }

                        if (!name || name.includes('{') || name.length < 2) continue;

                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <img src="${imgRaw}" onerror="this.src='https://via.placeholder.com/150?text=No+Photo'">
                            <h3>${name}</h3>
                            <button class="btn" onclick="sendOrder('${name}')">Выбрать</button>
                        `;
                        container.appendChild(card);
                    }
                }
                status.style.display = 'none';
            } catch (e) {
                console.error(e);
                document.getElementById('status').innerText = 'Ошибка: не удалось загрузить таблицу';
            }
        }

        function sendOrder(name) {
            window.Telegram.WebApp.sendData(name);
            window.Telegram.WebApp.close();
        }

        loadCatalog();
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
