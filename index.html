<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XV Concierge</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #D4AF37; --black: #000; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--black); color: white; margin: 0; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; text-align: center;
        }

        .logo { font-size: 40px; font-weight: 200; letter-spacing: 10px; color: var(--gold); margin-bottom: 10px; }
        .divider { width: 40px; height: 1px; background: var(--gold); margin-bottom: 20px; }
        
        .main-text { font-size: 18px; font-weight: 300; letter-spacing: 1px; margin-bottom: 5px; }
        .sub-text { font-size: 12px; color: #666; margin-bottom: 40px; padding: 0 40px; line-height: 1.5; }

        .step-box { background: #111; border: 1px solid #222; padding: 20px; border-radius: 15px; margin-bottom: 30px; width: 80%; }
        .step { font-size: 11px; color: var(--gold); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
        .step-desc { font-size: 13px; color: #ccc; }

        .action-btn { 
            background: var(--gold); color: black; border: none; 
            padding: 18px 40px; border-radius: 50px; 
            font-weight: 700; font-size: 14px; text-transform: uppercase; 
            letter-spacing: 2px; cursor: pointer; transition: 0.3s;
        }
        .action-btn:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body>

    <div class="logo">XV</div>
    <div class="divider"></div>
    
    <div class="main-text">PERSONAL CONCIERGE</div>
    <div class="sub-text">Найдем любую вещь по фото. Лучшие батчи, прямая доставка с Mulebuy.</div>

    <div class="step-box">
        <div class="step">Инструкция</div>
        <div class="step-desc">Пришлите фото или ссылку на товар в чат, и мы найдем лучшую цену за 5 минут.</div>
    </div>

    <button class="action-btn" onclick="startOrder()">Отправить запрос</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function startOrder() {
            // Закрываем мини-апп и отправляем техническое сообщение боту
            tg.sendData("START_ORDER_FLOW");
            tg.close();
        }
    </script>
</body>
</html>
