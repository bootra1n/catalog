<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: #2c2c2c; border-radius: 12px; padding: 10px; text-align: center; border: 1px solid #3d3d3d; }
        .card img { width: 100%; border-radius: 8px; height: 140px; object-fit: cover; background: #000; }
        .card h3 { font-size: 12px; margin: 10px 0; height: 30px; overflow: hidden; color: #eee; }
        .btn { display: block; background: #d4af37; color: black; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; width: 100%; }
        #status { text-align: center; margin-top: 20px; color: #d4af37; }
    </style>
</head>
<body>
    <h2 style="text-align: center; color: #d4af37;">XV Catalog</h2>
    <div id="status">Загрузка данных (их много, подождите)...</div>
    <div class="grid" id="catalog"></div>

    <script>
        // Используем ссылку htmlview, которую ты прислал
        const URL = 'https://docs.google.com/spreadsheets/d/1qlHWEkGHqrR_WT_g1-ogpKZn88c1xloEq5sDjszK3Kg/htmlview';

        async function loadCatalog() {
            try {
                // Пытаемся получить HTML код страницы через прокси, чтобы обойти защиту браузера
                const response = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(URL));
                const data = await response.json();
                const html = data.contents;
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const rows = doc.querySelectorAll('tr');
                const container = document.getElementById('catalog');
                container.innerHTML = '';

                // Проходим по всем строкам таблицы (их там тысячи)
                rows.forEach((row, index) => {
                    const cells = row.querySelectorAll('td');
                    if (cells.length >= 2) {
                        const name = cells[0].innerText.trim();
                        let img = cells[1].innerText.trim();

                        // Фильтруем мусор (пустые строки и заголовки)
                        if (name.length > 2 && (img.includes('http') || img.includes('IMAGE'))) {
                            
                            // Если внутри IMAGE("ссылка"), достаем только ссылку
                            if (img.includes('IMAGE("')) {
                                img = img.split('IMAGE("')[1].split('")')[0];
                            }

                            const card = document.createElement('div');
                            card.className = 'card';
                            card.innerHTML = `
                                <img src="${img}" onerror="this.src='https://via.placeholder.com/150?text=No+Photo'">
                                <h3>${name}</h3>
                                <button class="btn" onclick="sendOrder('${name}')">Выбрать</button>
                            `;
                            container.appendChild(card);
                        }
                    }
                });

                if (container.children.length === 0) {
                    document.getElementById('status').innerText = "Не удалось загрузить товары автоматически.";
                } else {
                    document.getElementById('status').style.display = 'none';
                }

            } catch (e) {
                console.error(e);
                document.getElementById('status').innerText = "Ошибка сети. Попробуйте обновить страницу.";
            }
        }

        function sendOrder(name) {
            window.Telegram.WebApp.sendData(name);
            window.Telegram.WebApp.close();
        }

        loadCatalog();
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
