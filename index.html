<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>XV ARCHIVE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; margin: 0; padding: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: #111; border-radius: 12px; padding: 8px; border: 1px solid #222; text-align: center; }
        .card img { width: 100%; border-radius: 8px; height: 160px; object-fit: cover; background: #1a1a1a; margin-bottom: 8px; }
        .price { color: #d4af37; font-weight: bold; font-size: 15px; margin-bottom: 8px; }
        .btn { background: #d4af37; color: #000; padding: 10px; border-radius: 6px; font-weight: bold; border: none; width: 100%; }
        h3 { font-size: 11px; margin: 5px 0; height: 28px; overflow: hidden; color: #ccc; }
    </style>
</head>
<body>
    <h2 style="text-align: center; color: #d4af37;">XV ARCHIVE</h2>
    <div class="grid" id="catalog">Загрузка...</div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTI2BkeAt7A2aCoWhS4ybHRY7sORrfDPcv9NiHaJ-kiD4_a3eOSnsnQKLGFsSta37IoXPJmAGBhCao4/pub?output=csv';
        const tg = window.Telegram.WebApp;

        async function load() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                // Разбиваем строки, учитывая возможные запятые внутри кавычек
                const rows = text.split(/\r?\n(?=(?:(?:[^"]*"){2})*[^"]*$)/).slice(1);
                const container = document.getElementById('catalog');
                container.innerHTML = '';

                rows.forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    
                    const render = (nIdx, lIdx, pIdx) => {
                        let name = cols[nIdx]?.replace(/"/g, '').trim() || '';
                        let link = cols[lIdx]?.replace(/"/g, '').trim() || '';
                        let price = cols[pIdx]?.replace(/"/g, '').trim() || '';

                        // Ищем ID товара в ссылке. Mulebuy и Weidian используют "id="
                        const idMatch = link.match(/[?&]id=(\d+)/);
                        
                        if (name && idMatch) {
                            const itemId = idMatch[1];
                            const card = document.createElement('div');
                            card.className = 'card';
                            
                            // Мы собираем ссылку на картинку сами! 
                            // Прокси wsrv.nl + прямой адрес картинки Weidian
                            const imgUrl = `https://wsrv.nl/?url=https://si.geilicdn.com/pc-item-image/${itemId}.jpg&w=300&output=webp`;

                            card.innerHTML = `
                                <img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/150?text=No+Photo'">
                                <h3>${name}</h3>
                                <div class="price">${price}</div>
                                <button class="btn" onclick="order('${name.replace(/'/g, "\\'")}','${link}')">Выбрать</button>
                            `;
                            container.appendChild(card);
                        }
                    };

                    // ПРОВЕРЬ ЭТИ ЦИФРЫ (ИНДЕКСЫ КОЛОНОК):
                    // 0 = A, 1 = B, 2 = C, 3 = D... 5 = F, 6 = G, 7 = H, 8 = I
                    render(0, 2, 3); // Товар слева (Имя в A, Ссылка в C, Цена в D)
                    render(5, 7, 8); // Товар справа (Имя в F, Ссылка в H, Цена в I)
                });
            } catch (e) { console.error("Ошибка:", e); }
        }

        function order(name, link) { tg.sendData(JSON.stringify({name, link})); }
        load();
    </script>
</body>
</html>
