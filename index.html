<script>
        async function loadCatalog() {
            try {
                const response = await fetch('data.csv');
                const csvText = await response.text();
                const rows = csvText.split('\n');
                const container = document.getElementById('catalog');
                container.innerHTML = '';

                rows.forEach(row => {
                    const columns = row.split(';'); // Используем точку с запятой
                    if (columns.length >= 2) {
                        const name = columns[0].trim();
                        const img = columns[1].trim();

                        if (name && img.startsWith('http')) {
                            const card = document.createElement('div');
                            card.className = 'card';
                            card.innerHTML = `
                                <img src="${img}" onerror="this.src='https://via.placeholder.com/150'">
                                <h3>${name}</h3>
                                <button class="btn" onclick="sendOrder('${name}')">Выбрать</button>
                            `;
                            container.appendChild(card);
                        }
                    }
                });
                document.getElementById('status').style.display = 'none';
            } catch (e) {
                document.getElementById('status').innerText = "Ошибка: загрузите data.csv на GitHub";
            }
        }
        
        function sendOrder(name) {
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.sendData(name);
                window.Telegram.WebApp.close();
            }
        }
        loadCatalog();
    </script>
