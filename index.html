<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>XV ARCHIVE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #0b0b0b; color: white; margin: 0; padding: 12px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: #181818; border-radius: 14px; padding: 10px; text-align: center; border: 1px solid #2a2a2a; display: flex; flex-direction: column; }
        .card img { width: 100%; border-radius: 10px; height: 160px; object-fit: cover; background: #121212; margin-bottom: 10px; }
        .card h3 { font-size: 13px; margin: 5px 0; height: 34px; overflow: hidden; color: #fff; line-height: 1.3; font-weight: 500; }
        .price { color: #d4af37; font-weight: 800; font-size: 16px; margin-bottom: 12px; }
        .btn { background: #d4af37; color: #000; padding: 11px; border-radius: 8px; font-weight: 700; border: none; width: 100%; cursor: pointer; }
        .btn:active { opacity: 0.8; }
    </style>
</head>
<body>
    <h2 style="text-align: center; color: #d4af37; font-size: 22px; letter-spacing: 1px; margin-bottom: 20px; font-weight: 900;">XV ARCHIVE</h2>
    <div class="grid" id="catalog">Загрузка товаров...</div>

    <script>
        // Твоя ссылка на CSV (убедись, что таблица опубликована: Файл -> Поделиться -> Опубликовать в интернете)
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTI2BkeAt7A2aCoWhS4ybHRY7sORrfDPcv9NiHaJ-kiD4_a3eOSnsnQKLGFsSta37IoXPJmAGBhCao4/pub?output=csv';
        
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        async function loadCatalog() {
            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                // Разбиваем CSV на строки, игнорируя запятые внутри кавычек
                const rows = data.split(/\r?\n(?=(?:(?:[^"]*"){2})*[^"]*$)/).slice(1);
                const container = document.getElementById('catalog');
                container.innerHTML = '';

                rows.forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    
                    const renderCard = (nameIdx, imgIdx, linkIdx, priceIdx) => {
                        let name = cols[nameIdx]?.replace(/"/g, '').trim() || '';
                        let imgUrl = cols[imgIdx]?.replace(/"/g, '').trim() || '';
                        let link = cols[linkIdx]?.replace(/"/g, '').trim() || '';
                        let price = cols[priceIdx]?.replace(/"/g, '').trim() || '';

                        if (name && link) {
                            const card = document.createElement('div');
                            card.className = 'card';
                            
                            // Используем прокси wsrv.nl для обхода блокировок и быстрой загрузки
                            const safeImg = imgUrl ? `https://wsrv.nl/?url=${encodeURIComponent(imgUrl)}&w=300&output=webp` : 'https://via.placeholder.com/150?text=No+Photo';

                            card.innerHTML = `
                                <img src="${safeImg}" loading="lazy" onerror="this.src='https://via.placeholder.com/150?text=Error'">
                                <h3>${name}</h3>
                                <div class="price">${price}</div>
                                <button class="btn" onclick="sendOrder('${name.replace(/'/g, "\\'")}','${link}')">Выбрать</button>
                            `;
                            container.appendChild(card);
                        }
                    };

                    // ИНДЕКСЫ КОЛОНОК (A=0, B=1 ... K=10, L=11)
                    renderCard(0, 10, 2, 3); // Левая колонка (Имя A, Фото K, Ссылка C, Цена D)
                    renderCard(5, 11, 7, 8); // Правая колонка (Имя F, Фото L, Ссылка H, Цена I)
                });
            } catch (error) {
                document.getElementById('catalog').innerHTML = '<p style="text-align:center">Ошибка загрузки данных</p>';
            }
        }

        function sendOrder(name, link) {
            tg.sendData(JSON.stringify({ name, link }));
        }

        loadCatalog();
    </script>
</body>
</html>
